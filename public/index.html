<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusHub Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0B0F17;
            --card-bg: #161B26;
            --card-hover: #1F2636;
            --accent-blue: #0088FF;
            --accent-glow: rgba(0, 136, 255, 0.25);
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border-color: #262D3D;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header & Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38BDF8, #0088FF);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            background: var(--card-bg);
            padding: 0.25rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: #FFF;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Search & Controls Section */
        .search-box {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .search-input {
            flex: 1;
            background: #0F131C;
            border: 1px solid var(--border-color);
            padding: 0.85rem 1.25rem;
            border-radius: 10px;
            color: #FFF;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
        }

        .search-btn {
            background: var(--accent-blue);
            color: #FFF;
            border: none;
            padding: 0.85rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .search-btn:hover {
            box-shadow: 0 0 16px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* Filters Row */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .duration-select {
            background: #0F131C;
            color: #FFF;
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        /* Preset Quick Pills */
        .preset-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .pill {
            background: #0F131C;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.4rem 0.85rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pill:hover {
            border-color: var(--accent-blue);
            color: var(--text-main);
        }

        /* Video Feed Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-4px);
            border-color: #3B82F6;
        }

        .thumb-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bookmark-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(11, 15, 23, 0.8);
            border: 1px solid var(--border-color);
            color: #FFF;
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            font-size: 0.875rem;
            transition: background 0.2s;
            z-index: 10;
        }

        .bookmark-btn.saved {
            background: #EF4444;
            border-color: #EF4444;
        }

        .video-info {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: space-between;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .channel-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            flex: 1;
            background: #0F131C;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: var(--border-color);
        }

        /* Summary Modal Drawer */
        .summary-box {
            background: #0F131C;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.75rem;
            display: none;
            line-height: 1.5;
            max-height: 250px;
            overflow-y: auto;
        }

        /* Next Topics Drawer */
        .next-topics {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            display: none;
        }

        .next-topics h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .topic-pills {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        /* Video Player Overlay Modal */
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .player-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-modal-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 1010;
            background: rgba(15, 19, 28, 0.9);
            border: 1px solid var(--border-color);
            color: #FFF;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <!-- Pomodoro Timer Container -->
    <div class="focus-timer-container"
        style="background: var(--bg-card); padding: 1.5rem; border-radius: 12px; text-align: center; max-width: 500px; margin: 0 auto 2rem auto; border: 1px solid var(--border-color);">
        <h3 id="timerLabel"
            style="margin-bottom: 0.5rem; color: var(--text-main); font-size: 0.9rem; text-transform: uppercase;">Focus
            Session</h3>
        <div id="timerDisplay"
            style="font-size: 3rem; font-weight: bold; color: var(--accent-color); margin-bottom: 1rem;">25:00</div>

        <!-- Duration Customization Buttons -->
        <div style="margin-bottom: 1rem; display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap;">
            <button onclick="setTimerDuration(15)"
                style="padding: 0.4rem 0.8rem; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer;">15m</button>
            <button onclick="setTimerDuration(25)"
                style="padding: 0.4rem 0.8rem; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer;">25m</button>
            <button onclick="setTimerDuration(45)"
                style="padding: 0.4rem 0.8rem; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer;">45m</button>
            <button onclick="setTimerDuration(60)"
                style="padding: 0.4rem 0.8rem; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer;">60m</button>
        </div>

        <!-- Break and Control Buttons -->
        <div style="display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap;">
            <button onclick="startTimer()" id="startBtn"
                style="padding: 0.5rem 1.2rem; background: #2563EB; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">Start</button>
            <button onclick="pauseTimer()"
                style="padding: 0.5rem 1.2rem; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer;">Pause</button>
            <button onclick="resetTimer()"
                style="padding: 0.5rem 1.2rem; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer;">Reset</button>
            <button onclick="startBreak(5)"
                style="padding: 0.5rem 1.2rem; background: #059669; color: white; border: none; border-radius: 6px; cursor: pointer;">Short
                Break (5m)</button>
            <button onclick="startBreak(15)"
                style="padding: 0.5rem 1.2rem; background: #0D9488; color: white; border: none; border-radius: 6px; cursor: pointer;">Long
                Break (15m)</button>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="brand">
                <span style="font-size: 1.8rem;">🎯</span>
                <h1>FocusHub</h1>
            </div>
            <div class="nav-tabs">
                <button class="tab-btn" id="tabHistory" onclick="showHistoryTab()">History (<span
                        id="historyCount">0</span>)</button>
                <button class="tab-btn active" id="tabSearch" onclick="showSearchTab()">Search Feed</button>
                <button class="tab-btn" id="tabSaved" onclick="showSavedTab()">Saved (<span
                        id="savedCount">0</span>)</button>
            </div>
        </header>

        <!-- Search Controls -->
        <div class="search-box" id="searchBoxSection">
            <div class="input-group">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="What do you want to learn today? (e.g. Design, Python, Calculus)" />
                <button class="search-btn" onclick="executeSearch()">Search</button>
            </div>

            <div class="controls-row">
                <!-- Preset Pills -->
                <div class="preset-pills">
                    <span class="pill" onclick="quickSearch('Design')">🎨 Design</span>
                    <span class="pill" onclick="quickSearch('Gaming')">🎮 Gaming</span>
                    <span class="pill" onclick="quickSearch('Coding')">💻 Coding</span>
                    <span class="pill" onclick="quickSearch('Science')">🔬 Science</span>
                </div>

                <!-- Duration Filter -->
                <div class="filter-group">
                    <label for="durationFilter">⏱️ Duration:</label>
                    <select id="durationFilter" class="duration-select" onchange="executeSearch()">
                        <option value="any">Any Length</option>
                        <option value="short">Short (&lt; 4 mins)</option>
                        <option value="medium">Medium (4 - 20 mins)</option>
                        <option value="long">Long (&gt; 20 mins)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Video Grid -->
        <div class="video-grid" id="videoGrid"></div>

        <!-- Smart Related Topic Pills -->
        <div class="next-topics" id="nextTopicsSection">
            <h3>🚀 Where to Next? Suggested Follow-up Topics:</h3>
            <div class="topic-pills" id="topicPills"></div>
        </div>
    </div>

    <!-- In-Page Video Player Modal -->
    <div class="player-modal" id="playerModal">
        <div class="player-content">
            <button class="close-modal-btn" onclick="closePlayer()">✕</button>
            <div class="iframe-wrapper">
                <iframe id="youtubeIframe"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        function showHistoryTab() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tabHistory')?.classList.add('active');
            currentTab = 'history';
            renderVideos(watchedVideos);
        }

        function showSearchTab() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tabSearch')?.classList.add('active');
            currentTab = 'search';
            renderVideos(currentSearchResults);
        }

        function showSavedTab() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tabSaved')?.classList.add('active');
            currentTab = 'saved';
            renderVideos(savedVideos);
        }
        // --- Pomodoro Timer Logic ---
        function handleWatch(id) {
            // Find the video object from whichever list is currently active or search results
            let videoObj = currentSearchResults.find(v => (v.id?.videoId || v.id) === id);
            if (!videoObj && typeof savedVideos !== 'undefined') {
                videoObj = savedVideos.find(v => (v.id?.videoId || v.id) === id);
            }
            if (!videoObj && typeof watchedVideos !== 'undefined') {
                videoObj = watchedVideos.find(v => (v.id?.videoId || v.id) === id);
            }

            if (videoObj) {
                // Normalize ID format just in case
                const cleanId = videoObj.id?.videoId || videoObj.id;
                const normalizedObj = {
                    id: cleanId,
                    title: videoObj.title || videoObj.snippet?.title,
                    channel: videoObj.channel || videoObj.snippet?.channelTitle,
                    thumbnail: videoObj.thumbnail || videoObj.snippet?.thumbnails?.high?.url || videoObj.snippet?.thumbnails?.medium?.url,
                    description: videoObj.description || videoObj.snippet?.description
                };

                addToWatchHistory(normalizedObj);

                const modal = document.getElementById('playerModal');
                const iframe = document.getElementById('youtubeIframe');
                if (iframe && modal) {
                    iframe.src = `https://www.youtube-nocookie.com/embed/${cleanId}?autoplay=1&rel=0`;
                    modal.style.display = 'flex';
                }
            }
        }
        let totalSeconds = 25 * 60;
        let remainingSeconds = totalSeconds;
        let timerInterval = null;
        let isRunning = false;
        let currentMode = 'Focus Session';

        function updateDisplay() {
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            document.getElementById('timer-display').innerText =
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function setTimerDuration(minutes) {
            pauseTimer();
            currentMode = 'Focus Session';
            const label = document.getElementById('timerLabel');
            if (label) label.innerText = currentMode;
            totalSeconds = minutes * 60;
            remainingSeconds = totalSeconds;
            updateDisplay();
        }

        function startBreak(minutes) {
            pauseTimer();
            currentMode = minutes === 5 ? 'Short Break' : 'Long Break';
            const label = document.getElementById('timerLabel');
            if (label) label.innerText = currentMode;
            totalSeconds = minutes * 60;
            remainingSeconds = totalSeconds;
            updateDisplay();
            startTimer();
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            timerInterval = setInterval(() => {
                if (remainingSeconds > 0) {
                    remainingSeconds--;
                    updateDisplay();
                } else {
                    pauseTimer();
                    alert(`${currentMode} finished! Time for a change.`);
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
        }

        function resetTimer() {
            pauseTimer();
            remainingSeconds = totalSeconds;
            updateDisplay();
        }
        let currentTab = 'search';
        let currentQuery = '';
        let currentSearchResults = [];
        let savedVideos = [];
        let watchedVideos = [];
        try {
            watchedVideos = JSON.parse(localStorage.getItem('focushub_watched')) || [];
        } catch (e) {
            watchedVideos = [];
        }
        function updateCounts() {
            const historyBtn = document.querySelector('button[onclick*="history"]');
            if (historyBtn) historyBtn.innerText = `History (${watchedVideos.length})`;

            const savedBtn = document.querySelector('button[onclick*="saved"]');
            if (savedBtn) savedBtn.innerText = `Saved (${savedVideos.length})`;
        }
        function addToWatchHistory(videoObj) {
            const incomingId = videoObj.id?.videoId || videoObj.id;

            // Remove if it's already in history using the clean ID comparison
            watchedVideos = watchedVideos.filter(v => {
                const existingId = v.id?.videoId || v.id;
                return existingId !== incomingId;
            });

            // Add to the front
            watchedVideos.unshift(videoObj);

            // Keep only the last 20 watched videos
            if (watchedVideos.length > 20) {
                watchedVideos.pop();
            }

            localStorage.setItem('focushub_watched', JSON.stringify(watchedVideos));
            updateCounts();
        }
        savedVideos = JSON.parse(localStorage.getItem('focushub_saved') || '[]');
        try { } catch (e) {
            savedVideos = [];
        }

        const TOPIC_RELATIONS = {
            'design': ['Figma Basics', 'UI/UX Principles', 'Wireframing', 'Color Theory'],
            'coding': ['Data Structures', 'Python Project', 'Web Dev Basics', 'Git & GitHub'],
            'gaming': ['Game Engine Basics', 'Unity Tutorial', 'Unreal Engine', '3D Modeling'],
            'science': ['Astrophysics', 'Quantum Mechanics', 'Biology Essentials', 'Neuroscience']
        };

        updateSavedCount();

        async function executeSearch() {
            const rawQuery = document.getElementById('searchInput').value.trim();
            if (!rawQuery) return;

            let enhancedQuery = rawQuery;
            const lower = rawQuery.toLowerCase();
            const words = rawQuery.split(' ');

            // Prevent confusion like "cycle" matching software life cycles
            if (lower === 'cycle' || lower === 'biking') {
                enhancedQuery = 'bicycling workout health benefits exercise cycling';
            } else if (words.length <= 2) {
                // General smart educational enhancement for short queries
                enhancedQuery = `${rawQuery} educational tutorial guide course`;
            }

            const duration = document.getElementById('durationFilter').value;
            currentQuery = rawQuery.toLowerCase();
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center;">Searching educational videos...</p>';

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(enhancedQuery)}&duration=${duration}`);
                const data = await res.json();

                let results = Array.isArray(data) ? data : (data.results || []);

                // Slice to show up to 8 videos instead of default amount
                currentSearchResults = results.slice(0, 8);

                if (!currentSearchResults || currentSearchResults.length === 0) {
                    grid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center;">No educational videos found.</p>';
                    document.getElementById('nextTopicsSection').style.display = 'none';
                    return;
                }

                renderVideos(currentSearchResults);
                renderRelatedTopics(currentQuery);
            } catch (err) {
                grid.innerHTML = '<p style="color: #EF4444; grid-column: 1/-1; text-align: center;">Error loading videos.</p>';
            }
        }
        function quickSearch(term) {
            document.getElementById('searchInput').value = term;
            executeSearch();
        }

        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            videos.forEach(v => {
                const id = v.id?.videoId || v.id;
                const snippet = v.snippet || {};
                const title = v.title || snippet.title || 'Untitled Video';
                const channel = v.channel || snippet.channelTitle || 'Unknown Channel';
                const thumb = v.thumbnail || snippet.thumbnails?.high?.url || snippet.thumbnails?.medium?.url || '';
                const desc = snippet.description || v.description || 'No detailed description available.';

                const isSaved = savedVideos.some(sv => sv.id === id);

                const videoDataObj = { id, title, channel, thumbnail: thumb, description: desc };

                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
          <div class="thumb-container">
            <img src="${thumb}" alt="Thumbnail" />
            <button class="bookmark-btn ${isSaved ? 'saved' : ''}" id="btn-${id}">
              ${isSaved ? '❤️ Saved' : '🔖 Save'}
            </button>
          </div>
          <div class="video-info">
            <div class="video-title"></div>
            <div class="channel-name"></div>
            
           <div class="card-actions">
  <button class="action-btn" onclick="handleWatch('${id}')">Watch</button>
  <button class="action-btn" onclick="toggleSummary('${id}')">Summary</button>
</div>

            <div class="summary-box" id="summary-${id}">
              <strong>📌 Full Summary / Description:</strong>
              <p style="margin-top: 0.4rem; white-space: pre-line;"></p>
            </div>
          </div>
        `;

                // Safely insert text content to avoid syntax crashes on quotes
                card.querySelector('.video-title').textContent = title;
                card.querySelector('.channel-name').textContent = channel;
                card.querySelector(`#summary-${id} p`).textContent = desc;

                // Attach click handler safely via event listener
                const saveBtn = card.querySelector(`#btn-${id}`);
                saveBtn.addEventListener('click', () => toggleSave(videoDataObj));

                grid.appendChild(card);
            });
        }

        function openPlayerWithHistory(videoObj) {
            // 1. Record to history array and update storage
            addToWatchHistory(videoObj);

            // 2. Open the player modal
            const modal = document.getElementById('playerModal');
            const iframe = document.getElementById('youtubeIframe');
            iframe.src = `https://www.youtube-nocookie.com/embed/${videoObj.id}?autoplay=1&rel=0`;
            modal.style.display = 'flex';
        }

        function closePlayer() {
            const modal = document.getElementById('playerModal');
            const iframe = document.getElementById('youtubeIframe');
            iframe.src = '';
            modal.style.display = 'none';
        }
        function switchTab(tabName) {
            currentTab = tabName;

            // Update active button styles
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tabName === 'history') {
                document.getElementById('tabHistory')?.classList.add('active');
                renderVideos(watchedVideos);
            } else if (tabName === 'saved') {
                document.getElementById('tabSaved')?.classList.add('active');
                renderVideos(savedVideos);
            } else {
                document.getElementById('tabSearch')?.classList.add('active');
                renderVideos(currentSearchResults);
            }
        }
        function toggleSave(videoObj) {
            const index = savedVideos.findIndex(sv => sv.id === videoObj.id);

            if (index > -1) {
                savedVideos.splice(index, 1);
            } else {
                savedVideos.push(videoObj);
            }

            localStorage.setItem('focushub_saved', JSON.stringify(savedVideos));
            updateSavedCount();

            if (currentTab === 'saved') {
                renderSavedTab();
            } else {
                renderVideos(currentSearchResults);
            }
        }

        function updateSavedCount() {
            document.getElementById('savedCount').innerText = savedVideos.length;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabSearch').classList.toggle('active', tab === 'search');
            document.getElementById('tabSaved').classList.toggle('active', tab === 'saved');

            if (tab === 'saved') {
                document.getElementById('searchBoxSection').style.display = 'none';
                document.getElementById('nextTopicsSection').style.display = 'none';
                renderSavedTab();
            } else {
                document.getElementById('searchBoxSection').style.display = 'block';
                if (currentSearchResults.length > 0) {
                    renderVideos(currentSearchResults);
                    if (currentQuery) renderRelatedTopics(currentQuery);
                } else {
                    document.getElementById('videoGrid').innerHTML = '';
                }
            }
        }

        function renderSavedTab() {
            const grid = document.getElementById('videoGrid');
            if (savedVideos.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center;">No saved videos yet. Click "🔖 Save" on any video card!</p>';
                return;
            }
            renderVideos(savedVideos);
        }

        function toggleSummary(id) {
            const box = document.getElementById(`summary-${id}`);
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function renderRelatedTopics(query) {
            const section = document.getElementById('nextTopicsSection');
            const container = document.getElementById('topicPills');

            let matches = [];
            Object.keys(TOPIC_RELATIONS).forEach(key => {
                if (query.includes(key)) matches = TOPIC_RELATIONS[key];
            });

            if (matches.length === 0) {
                section.style.display = 'none';
                return;
            }

            container.innerHTML = matches.map(topic => `
        <span class="pill" onclick="quickSearch('${topic}')">${topic}</span>
      `).join('');

            section.style.display = 'block';
        }
    </script>
</body>

</html>
